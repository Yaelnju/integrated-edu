# 集成服务器
# 监听端口（A/B/C 学院的业务 TCP 在跨院选课 / 集成统计 / 集成退课时回连本端口）
integration.server.port=9200

# 三院 XML 端口（集成服务器仅通过 XML 通道与各院通信）
college.a.xml.host=127.0.0.1
college.a.xml.port=9102
college.b.xml.host=127.0.0.1
college.b.xml.port=9101
college.c.xml.host=127.0.0.1
college.c.xml.port=9100

# 三院业务 TCP 端口（集成服务器在跨院退课、跨院 PICK 时回调本院 GUI 端口）
college.a.gui.host=127.0.0.1
college.a.gui.port=9002
college.b.gui.host=127.0.0.1
college.b.gui.port=9001
college.c.gui.host=127.0.0.1
college.c.gui.port=9000

# 集成服务器不直接连任何 DBMS；db.* 配置项故意留空
